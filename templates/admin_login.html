<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Megacrédito</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#080808; color:#fff;
  font-family:'DM Sans',sans-serif; font-weight:300;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:32px 20px;
}
.logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:28px; letter-spacing:8px; margin-bottom:48px;
}
.logo span { color:#C9A227; }
.card {
  background:#0e0e0e; border:1px solid #1c1c1c;
  border-radius:6px; width:100%; max-width:400px; overflow:hidden;
}
.card-header {
  background:#C9A227; padding:22px 32px;
}
.card-header h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:20px; letter-spacing:4px; color:#000;
}
.card-header p { font-size:12px; color:rgba(0,0,0,0.5); margin-top:2px; }
.card-body { padding:32px; }
.field { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
.field label { font-size:11px; letter-spacing:4px; color:#555; }
.field input {
  background:#080808; border:1px solid #1c1c1c;
  border-radius:3px; padding:14px 16px;
  color:#fff; font-family:'DM Sans',sans-serif; font-size:15px;
  outline:none; transition:border-color .2s;
}
.field input:focus { border-color:#C9A227; }
.erro {
  background:rgba(220,50,50,0.08); border:1px solid rgba(220,50,50,0.2);
  border-radius:3px; padding:12px 16px; font-size:13px;
  color:#f87272; margin-bottom:16px;
}
.btn {
  width:100%; font-family:'Bebas Neue',sans-serif;
  font-size:16px; letter-spacing:5px;
  background:#C9A227; color:#000; border:none;
  padding:16px; border-radius:2px; cursor:pointer;
  transition:opacity .2s;
}
.btn:hover { opacity:.85; }
.footer { margin-top:24px; font-size:11px; color:#333; text-align:center; }
</style>
</head>
<body>

<div class="logo">MEGA<span>CRÉDITO</span></div>

<div class="card">
  <div class="card-header">
    <h1>PAINEL ADMIN</h1>
    <p>Acesso restrito — somente administrador</p>
  </div>
  <div class="card-body">
    {% if error %}
    <div class="erro">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>SENHA DE ADMINISTRADOR</label>
        <input type="password" name="senha" placeholder="••••••••" autofocus autocomplete="off" required>
      </div>
      <button type="submit" class="btn">ENTRAR</button>
    </form>
  </div>
</div>

<div class="footer">Megacrédito © 2025 — Acesso restrito</div>

</body>
</html>
