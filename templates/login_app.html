{% extends "base.html" %}
{% block title %}Acessar — Mega Credito{% endblock %}
{% block extra_css %}
<style>
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem;width:100%;max-width:400px}
.login-logo{font-size:2rem;font-weight:800;color:var(--accent);text-align:center;margin-bottom:0.4rem}
.login-logo span{color:var(--text)}
.login-sub{text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:2rem;font-family:var(--mono)}
.input-wrap{position:relative}
.input-wrap input{padding-right:3rem}
.eye-btn{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:0.25rem;line-height:1}
.eye-btn:hover{color:var(--text)}
.pin-error{color:var(--danger);font-family:var(--mono);font-size:0.78rem;margin-top:0.75rem;min-height:1rem;text-align:center}
.divider{display:flex;align-items:center;gap:0.75rem;margin:1.5rem 0;color:var(--muted);font-size:0.75rem;font-family:var(--mono)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">Mega<span> Credito</span></div>
    <div class="login-sub">acesso ao sistema</div>

    <form method="post" action="/acesso">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <div class="input-wrap">
          <input type="password" name="senha" id="senhaInput" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="toggleSenha()" id="eyeBtn">👁</button>
        </div>
      </div>

      {% if error %}
      <div class="pin-error">{{ error }}</div>
      {% endif %}

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.25rem">
        Entrar
      </button>
    </form>
  </div>
</div>
<script>
function toggleSenha() {
  const inp = document.getElementById('senhaInput');
  const btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
{% endblock %}
